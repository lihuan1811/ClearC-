name: Build C++ Qt Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - ".github/workflows/build-cpp-qt.yml"

permissions:
  contents: write

jobs:
  build-cpp-qt:
    name: Build C++ Qt executable
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          arch: "win64_msvc2019_64"

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item -LiteralPath "build/Release/C DiskGlow.exe" -Destination "package/C DiskGlow.exe" -Force
          windeployqt "package/C DiskGlow.exe"

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path package/* -DestinationPath CDriveCleanerQt.zip -Force

      - name: Build portable single-file exe
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          @'
          Unicode True
          Name "C DiskGlow"
          OutFile "CDriveCleanerQt-Portable.exe"
          RequestExecutionLevel user
          SilentInstall silent
          AutoCloseWindow true
          ShowInstDetails nevershow

          Section
            InitPluginsDir
            SetOutPath "$PLUGINSDIR"
            File /r "package\*"
            ExecWait '"$PLUGINSDIR\C DiskGlow.exe"'
          SectionEnd
          '@ | Set-Content -Path portable.nsi -Encoding UTF8
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (!(Test-Path $makensis)) {
            $makensis = "${env:ProgramFiles}\NSIS\makensis.exe"
          }
          & $makensis portable.nsi

      - name: Upload C++ Qt package
        uses: actions/upload-artifact@v4
        with:
          name: CDriveCleanerQt
          path: |
            CDriveCleanerQt.zip
            CDriveCleanerQt-Portable.exe
          if-no-files-found: error

  release:
    name: Publish C++ Qt release
    needs:
      - build-cpp-qt
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "cpp-build-$($env:GITHUB_RUN_NUMBER)"
          gh release delete $tag --cleanup-tag --yes --repo $env:GITHUB_REPOSITORY 2>$null
          gh release create $tag `
            "release-assets/CDriveCleanerQt/CDriveCleanerQt.zip" `
            "release-assets/CDriveCleanerQt/CDriveCleanerQt-Portable.exe" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "C DiskGlow C++ Qt build $($env:GITHUB_RUN_NUMBER)" `
            --notes "C++ Qt build. Use CDriveCleanerQt-Portable.exe for a single-file portable launcher, or unzip CDriveCleanerQt.zip and run C DiskGlow.exe." `
            --latest
