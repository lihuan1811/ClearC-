name: Build C++ Qt Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - ".github/workflows/build-cpp-qt.yml"

permissions:
  contents: write

jobs:
  build-cpp-qt:
    name: Build C++ Qt ${{ matrix.arch }} executable
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            qt_arch: win64_msvc2019_64
            cmake_arch: x64
          - arch: x86
            qt_arch: win32_msvc2019
            cmake_arch: Win32

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: ${{ matrix.qt_arch }}

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }}

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item -LiteralPath "build/Release/C DiskGlow.exe" -Destination "package/C DiskGlow.exe" -Force
          windeployqt --compiler-runtime "package/C DiskGlow.exe"

      - name: Bundle MSVC runtime
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Redist.14.Latest -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            throw "Visual Studio installation with VC redist was not found."
          }

          $redistRoot = Join-Path $vsInstall "VC\Redist\MSVC"
          $crtDir = Get-ChildItem -Path $redistRoot -Recurse -Directory |
            Where-Object { $_.FullName -match "\\${{ matrix.arch }}\\Microsoft\.VC\d+\.CRT$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $crtDir) {
            throw "MSVC x64 CRT redistributable directory was not found under $redistRoot."
          }

          Copy-Item -Path (Join-Path $crtDir.FullName "*.dll") -Destination package -Force
          foreach ($dll in @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")) {
            if (!(Test-Path (Join-Path "package" $dll))) {
              throw "Required MSVC runtime DLL is missing from package: $dll"
            }
          }

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path package/* -DestinationPath CDriveCleanerQt-${{ matrix.arch }}.zip -Force

      - name: Build portable single-file exe
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          @'
          Unicode True
          Name "C DiskGlow"
          OutFile "CDriveCleanerQt-${{ matrix.arch }}-Portable.exe"
          RequestExecutionLevel admin
          SilentInstall silent
          AutoCloseWindow true
          ShowInstDetails nevershow

          Section
            InitPluginsDir
            SetOutPath "$PLUGINSDIR"
            File /r "package\*"
            ExecWait '"$PLUGINSDIR\C DiskGlow.exe"'
          SectionEnd
          '@ | Set-Content -Path portable.nsi -Encoding UTF8
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (!(Test-Path $makensis)) {
            $makensis = "${env:ProgramFiles}\NSIS\makensis.exe"
          }
          & $makensis portable.nsi

      - name: Upload C++ Qt package
        uses: actions/upload-artifact@v4
        with:
          name: CDriveCleanerQt-${{ matrix.arch }}
          path: |
            CDriveCleanerQt-${{ matrix.arch }}.zip
            CDriveCleanerQt-${{ matrix.arch }}-Portable.exe
          if-no-files-found: error

  release:
    name: Publish C++ Qt release
    needs:
      - build-cpp-qt
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "cpp-build-$($env:GITHUB_RUN_NUMBER)"
          gh release delete $tag --cleanup-tag --yes --repo $env:GITHUB_REPOSITORY 2>$null
          gh release create $tag `
            "release-assets/CDriveCleanerQt-x64/CDriveCleanerQt-x64.zip" `
            "release-assets/CDriveCleanerQt-x64/CDriveCleanerQt-x64-Portable.exe" `
            "release-assets/CDriveCleanerQt-x86/CDriveCleanerQt-x86.zip" `
            "release-assets/CDriveCleanerQt-x86/CDriveCleanerQt-x86-Portable.exe" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "C DiskGlow C++ Qt build $($env:GITHUB_RUN_NUMBER)" `
            --notes "C++ Qt 5.15 Windows build. Choose x64 for 64-bit Windows or x86 for 32-bit Windows. Use the matching Portable.exe for a single-file launcher, or unzip the matching package and run C DiskGlow.exe." `
            --latest
