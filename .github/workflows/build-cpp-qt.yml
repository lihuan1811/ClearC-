name: Build C++ Qt Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "cpp_qt/**"
      - ".github/workflows/build-cpp-qt.yml"

permissions:
  contents: write

jobs:
  build-cpp-qt:
    name: Build C++ Qt executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          arch: "win64_msvc2019_64"

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item -LiteralPath "build/Release/C DiskGlow.exe" -Destination "package/C DiskGlow.exe" -Force
          windeployqt "package/C DiskGlow.exe"

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path package/* -DestinationPath CDriveCleanerQt.zip -Force

      - name: Upload C++ Qt package
        uses: actions/upload-artifact@v4
        with:
          name: CDriveCleanerQt
          path: CDriveCleanerQt.zip
          if-no-files-found: error

  release:
    name: Publish C++ Qt release
    needs:
      - build-cpp-qt
    runs-on: windows-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "cpp-build-$($env:GITHUB_RUN_NUMBER)"
          gh release delete $tag --cleanup-tag --yes --repo $env:GITHUB_REPOSITORY 2>$null
          gh release create $tag `
            "release-assets/CDriveCleanerQt/CDriveCleanerQt.zip" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "C DiskGlow C++ Qt build $($env:GITHUB_RUN_NUMBER)" `
            --notes "C++ Qt build. Run C DiskGlow.exe from the zip package." `
            --latest
